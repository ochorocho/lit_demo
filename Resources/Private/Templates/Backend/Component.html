<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Content">
    <div class="lit-demo-layout">
        <f:render
            partial="Backend/Components/Sidebar"
            arguments="{
                currentGroup: currentGroup,
                groups: groups,
                route: routeIdentifier
            }"
        />
        <div class="lit-demo-content">
            <f:render
                partial="Backend/Components/{currentGroupPartial}"
                arguments="{_all}"
                optional="true"
            />
        </div>
    </div>
</f:section>

</html>
